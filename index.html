<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Pop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #16162a;
      --surface2: #1e1e35;
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.14);
      --purple: #7c5cfc;
      --purple-glow: rgba(124,92,252,0.25);
      --pink: #f05fa3;
      --teal: #00ddb3;
      --red: #ff5c77;
      --text: #f0eeff;
      --muted: rgba(240,238,255,0.45);
      --muted2: rgba(240,238,255,0.25);
      --green: #00ddb3;
      --green-bg: rgba(0,221,179,0.1);
      --red-bg: rgba(255,92,119,0.1);
      --radius: 20px;
      --radius-sm: 12px;
      --radius-xs: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    /* glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }
    .blob-1 { width: 380px; height: 380px; background: var(--purple); top: -120px; left: -100px; }
    .blob-2 { width: 300px; height: 300px; background: var(--pink); top: 40px; right: -80px; }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 0 16px;
    }

    /* вФАвФА TOP BAR вФАвФА */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 28px 0 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      display: grid; place-items: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .brand-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .btn-reset {
      border: none;
      background: var(--surface2);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.18s ease;
    }
    .btn-reset:hover { color: var(--text); border-color: var(--border-hover); }
    .btn-reset svg { width: 13px; height: 13px; }

    /* вФАвФА GREETING вФАвФА */
    .greeting {
      margin: 24px 0 28px;
    }
    .greeting h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(28px, 7vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 8px;
    }
    .greeting h1 span {
      background: linear-gradient(90deg, var(--purple), var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .greeting p {
      font-size: 14px;
      color: var(--muted);
      font-weight: 400;
    }

    /* вФАвФА PRODUCT CARDS вФАвФА */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      position: relative;
      transition: border-color 0.2s ease, transform 0.15s ease;
      animation: cardIn 0.35s ease both;
    }
    .card:hover { border-color: var(--border-hover); }
    .card.best { border-color: rgba(0,221,179,0.3); }
    .card.worst { border-color: rgba(255,92,119,0.25); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* card accent top line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: var(--radius-xs);
      background: var(--surface2);
      border: 0.5px solid var(--border);
      display: grid; place-items: center;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.15s ease;
      position: relative;
      flex-shrink: 0;
    }
    .card-icon:hover { background: rgba(124,92,252,0.15); }
    .card-icon-hint {
      position: absolute;
      bottom: -20px; left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: var(--muted2);
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      pointer-events: none;
    }

    .card-name-wrap {
      flex: 1;
      min-width: 0;
    }

    .card-name-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.01em;
      border-radius: 6px;
      padding: 2px 4px;
      margin-left: -4px;
      transition: background 0.15s ease;
    }
    .card-name-display:hover { background: rgba(255,255,255,0.05); }
    .card-name-display svg { width: 12px; height: 12px; opacity: 0.35; flex-shrink: 0; }

    .card-name-input {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      border-bottom: 1.5px solid var(--purple);
      width: 100%;
      padding: 2px 0;
      display: none;
      letter-spacing: -0.01em;
    }

    .card-sub {
      font-size: 11px;
      color: var(--muted2);
      margin-top: 2px;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
      letter-spacing: 0.03em;
      white-space: nowrap;
      display: none;
      font-family: 'DM Sans', sans-serif;
    }
    .badge.best { display: inline-flex; background: var(--green-bg); color: var(--teal); }
    .badge.worst { display: inline-flex; background: var(--red-bg); color: var(--red); }

    /* fields */
    .field-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field {
      flex: 1;
    }

    .field label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .field label svg { width: 11px; height: 11px; }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 12px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }
    .field input::placeholder { color: var(--muted2); font-weight: 400; }
    .field input:focus {
      border-color: rgba(124,92,252,0.5);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
    }

    /* per-unit result */
    .result-row {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 0.5px solid var(--border);
      transition: background 0.2s ease;
    }
    .card.best .result-row { background: var(--green-bg); border-color: rgba(0,221,179,0.15); }
    .card.worst .result-row { background: var(--red-bg); border-color: rgba(255,92,119,0.12); }

    .result-label {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .result-label svg { width: 11px; height: 11px; }

    .result-value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--muted);
      transition: color 0.2s ease;
    }
    .card.best .result-value { color: var(--teal); }
    .card.worst .result-value { color: var(--red); }
    .card:not(.best):not(.worst) .result-value.has-value { color: var(--text); }

    .result-math {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 3px;
      text-align: right;
    }

    /* remove button */
    .btn-remove {
      position: absolute;
      top: 14px; right: 14px;
      width: 26px; height: 26px;
      border-radius: 999px;
      background: transparent;
      border: none;
      color: var(--muted2);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      font-size: 14px;
    }
    .btn-remove:hover { background: var(--red-bg); color: var(--red); }
    .btn-remove svg { width: 14px; height: 14px; }

    /* вФАвФА ADD PRODUCT BUTTON вФАвФА */
    .btn-add {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border-radius: var(--radius);
      background: transparent;
      border: 1px dashed rgba(124,92,252,0.3);
      color: rgba(124,92,252,0.7);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.18s ease;
    }
    .btn-add:hover {
      background: rgba(124,92,252,0.07);
      border-color: rgba(124,92,252,0.55);
      color: var(--purple);
    }
    .btn-add svg { width: 16px; height: 16px; }

    /* вФАвФА VERDICT BANNER вФАвФА */
    .verdict {
      margin-top: 20px;
      border-radius: var(--radius);
      padding: 20px;
      background: linear-gradient(135deg, rgba(124,92,252,0.22), rgba(240,95,163,0.14));
      border: 0.5px solid rgba(124,92,252,0.3);
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      animation: cardIn 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .verdict::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(124,92,252,0.08));
      pointer-events: none;
    }
    .verdict.visible { display: flex; }

    .verdict-left { flex: 1; }
    .verdict-eyebrow {
      font-size: 10px;
      font-weight: 600;
      color: rgba(240,238,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
    }
    .verdict-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 3px;
    }
    .verdict-savings {
      font-size: 13px;
      color: var(--teal);
      font-weight: 500;
    }

    .verdict-icon {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      display: grid; place-items: center;
      font-size: 26px;
      flex-shrink: 0;
      border: 0.5px solid rgba(255,255,255,0.08);
    }

    /* вФАвФА SHARE BUTTON вФАвФА */
    .btn-share {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.18s ease;
    }
    .btn-share.visible { display: flex; }
    .btn-share:hover { background: rgba(255,255,255,0.05); color: var(--text); border-color: rgba(255,255,255,0.18); }
    .btn-share svg { width: 14px; height: 14px; }

    /* вФАвФА EMOJI PICKER вФАвФА */
    .emoji-picker {
      position: absolute;
      top: 58px; left: 18px;
      background: var(--surface2);
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-sm);
      padding: 10px;
      display: none;
      flex-wrap: wrap;
      gap: 6px;
      width: 220px;
      z-index: 10;
      animation: cardIn 0.2s ease;
      box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    }
    .emoji-picker.open { display: flex; }
    .emoji-btn {
      width: 34px; height: 34px;
      border-radius: 8px;
      background: transparent;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: grid; place-items: center;
      transition: background 0.1s ease;
    }
    .emoji-btn:hover { background: rgba(255,255,255,0.08); }

    /* вФАвФА TOAST вФАвФА */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 0.5px solid var(--border-hover);
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 400px) {
      .verdict-name { font-size: 18px; }
      .greeting h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="wrap">
    <!-- Top bar -->
    <div class="topbar">
      <div class="brand">
        <div class="logo">рЯЫТ</div>
        <div class="brand-name">Price Pop</div>
      </div>
      <button class="btn-reset" id="resetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
        Reset
      </button>
    </div>

    <!-- Greeting -->
    <div class="greeting">
      <h1>Find the <span>best deal</span>.</h1>
      <p>Type an amount and price for each product. We'll do the math.</p>
    </div>

    <!-- Cards -->
    <div class="cards" id="cards"></div>

    <!-- Add product -->
    <button class="btn-add" id="addBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      Add another product
    </button>

    <!-- Verdict -->
    <div class="verdict" id="verdict">
      <div class="verdict-left">
        <div class="verdict-eyebrow">Best value pick</div>
        <div class="verdict-name" id="verdictName">вАФ</div>
        <div class="verdict-savings" id="verdictSavings"></div>
      </div>
      <div class="verdict-icon">рЯПЖ</div>
    </div>

    <!-- Share -->
    <button class="btn-share" id="shareBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Share result
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const EMOJIS = ['рЯ•§','рЯІі','рЯНО','рЯІГ','рЯНЂ','рЯІА','рЯІє','рЯНМ','рЯ•Ы','рЯІЉ','рЯ•Ъ','рЯНК','рЯЫБ','рЯІВ','рЯНХ','вШХ','рЯЂЩ','рЯІї','рЯ•©','рЯІЖ'];

    let products = [];
    let activeEmojiCard = null;

    function uid() { return Math.random().toString(36).slice(2, 8); }

    function addProduct(name = '', amount = '', price = '', emoji = 'рЯЫНпЄП') {
      products.push({ id: uid(), name, amount, price, emoji });
      render();
    }

    function resetAll() {
      products = [];
      addProduct('Product A', '', '', 'рЯЫНпЄП');
      addProduct('Product B', '', '', 'рЯЫНпЄП');
      document.getElementById('verdict').classList.remove('visible');
      document.getElementById('shareBtn').classList.remove('visible');
    }

    function removeProduct(id) {
      products = products.filter(p => p.id !== id);
      render();
    }

    function updateField(id, field, value) {
      const p = products.find(p => p.id === id);
      if (p) { p[field] = value; recalc(); }
    }

    function setEmoji(id, emoji) {
      const p = products.find(p => p.id === id);
      if (p) {
        p.emoji = emoji;
        const card = document.querySelector(`[data-id="${id}"]`);
        if (card) card.querySelector('.card-icon').firstChild.textContent = emoji;
      }
      closeEmojiPicker();
    }

    function openEmojiPicker(id) {
      closeEmojiPicker();
      const card = document.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      const picker = card.querySelector('.emoji-picker');
      picker.classList.add('open');
      activeEmojiCard = id;
    }

    function closeEmojiPicker() {
      document.querySelectorAll('.emoji-picker.open').forEach(p => p.classList.remove('open'));
      activeEmojiCard = null;
    }

    function startRename(id) {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      const display = card.querySelector('.card-name-display');
      const input = card.querySelector('.card-name-input');
      display.style.display = 'none';
      input.style.display = 'block';
      input.focus();
      input.select();
    }

    function commitRename(id) {
      const card = document.querySelector(`[data-id="${id}"]`);
      if (!card) return;
      const display = card.querySelector('.card-name-display');
      const input = card.querySelector('.card-name-input');
      const p = products.find(p => p.id === id);
      if (p) p.name = input.value.trim() || p.name;
      display.querySelector('.name-text').textContent = p ? p.name : '';
      input.style.display = 'none';
      display.style.display = 'flex';
    }

    function formatNum(v, min = 2, max = 4) {
      return Number(v).toLocaleString(undefined, { minimumFractionDigits: min, maximumFractionDigits: max });
    }

    function render() {
      const container = document.getElementById('cards');
      container.innerHTML = '';

      products.forEach((p, idx) => {
        const canRemove = products.length > 2;
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = p.id;
        card.style.animationDelay = `${idx * 0.05}s`;

        const emojiHtml = EMOJIS.map(e =>
          `<button class="emoji-btn" onclick="setEmoji('${p.id}','${e}')">${e}</button>`
        ).join('');

        card.innerHTML = `
          ${canRemove ? `<button class="btn-remove" title="Remove" onclick="removeProduct('${p.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>` : ''}

          <div class="card-head">
            <div class="card-icon" onclick="openEmojiPicker('${p.id}')">
              <span>${p.emoji}</span>
              <span class="card-icon-hint">tap</span>
            </div>

            <div class="emoji-picker">
              ${emojiHtml}
            </div>

            <div class="card-name-wrap">
              <div class="card-name-display" onclick="startRename('${p.id}')">
                <span class="name-text">${escHtml(p.name)}</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
              </div>
              <input class="card-name-input" type="text" value="${escHtml(p.name)}"
                onblur="commitRename('${p.id}')"
                onkeydown="if(event.key==='Enter'||event.key==='Escape') this.blur()" />
              <div class="card-sub">tap name to rename</div>
            </div>

            <div class="badge"></div>
          </div>

          <div class="field-row">
            <div class="field">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18L18 4"/><path d="M14 4h4v4"/><path d="M6 20h14"/></svg>
                Amount
              </label>
              <input type="number" inputmode="decimal" min="0" step="any" placeholder="500"
                value="${escHtml(p.amount)}"
                oninput="updateField('${p.id}','amount',this.value)" />
            </div>
            <div class="field">
              <label>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><path d="M17 8c0-1.7-2.2-3-5-3s-5 1.3-5 3 1.8 2.5 5 3 5 1.3 5 3-2.2 3-5 3-5-1.3-5-3"/></svg>
                Price
              </label>
              <input type="number" inputmode="decimal" min="0" step="any" placeholder="89"
                value="${escHtml(p.price)}"
                oninput="updateField('${p.id}','price',this.value)" />
            </div>
          </div>

          <div class="result-row">
            <div class="result-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 18l5-5 4 4 7-8"/></svg>
              Price per unit
            </div>
            <div>
              <div class="result-value">вАФ</div>
              <div class="result-math"></div>
            </div>
          </div>
        `;

        if (canRemove) card.querySelector('.btn-remove').style.display = 'flex';
        container.appendChild(card);
      });

      recalc();
    }

    function escHtml(v) {
      return String(v ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function recalc() {
      const results = products.map(p => {
        const amount = parseFloat(p.amount);
        const price = parseFloat(p.price);
        const valid = isFinite(amount) && amount > 0 && isFinite(price) && price > 0;
        return { ...p, amount, price, valid, unitPrice: valid ? price / amount : null };
      });

      const valid = results.filter(r => r.valid);
      let best = null, worst = null;

      if (valid.length) {
        best = valid.reduce((a, b) => a.unitPrice <= b.unitPrice ? a : b);
        worst = valid.reduce((a, b) => a.unitPrice >= b.unitPrice ? a : b);
      }

      document.querySelectorAll('.card').forEach(card => {
        const id = card.dataset.id;
        const data = results.find(r => r.id === id);
        const badge = card.querySelector('.badge');
        const rv = card.querySelector('.result-value');
        const rm = card.querySelector('.result-math');

        card.classList.remove('best', 'worst');
        badge.className = 'badge';
        badge.textContent = '';

        if (data && data.valid) {
          rv.textContent = formatNum(data.unitPrice);
          rv.classList.add('has-value');
          rm.textContent = `${formatNum(data.price)} √Ј ${formatNum(data.amount, 0, 4)}`;
        } else {
          rv.textContent = 'вАФ';
          rv.classList.remove('has-value');
          rm.textContent = '';
        }

        if (best && data && data.valid && data.id === best.id) {
          card.classList.add('best');
          badge.className = 'badge best';
          badge.textContent = 'вЬУ Best deal';
        } else if (best && worst && best.id !== worst.id && data && data.valid && data.id === worst.id) {
          card.classList.add('worst');
          badge.className = 'badge worst';
          badge.textContent = 'вЖС Pricier';
        }
      });

      // verdict
      const verdict = document.getElementById('verdict');
      const vName = document.getElementById('verdictName');
      const vSavings = document.getElementById('verdictSavings');
      const shareBtn = document.getElementById('shareBtn');

      if (valid.length >= 2 && best && worst && best.id !== worst.id) {
        const savings = ((worst.unitPrice - best.unitPrice) / worst.unitPrice) * 100;
        vName.textContent = `${best.emoji}  ${best.name} wins`;
        vSavings.textContent = `${formatNum(savings, 1, 1)}% cheaper per unit than ${worst.name}`;
        verdict.classList.add('visible');
        shareBtn.classList.add('visible');
      } else if (valid.length === 1) {
        vName.textContent = 'Keep goingвА¶';
        vSavings.textContent = 'Add one more product';
        verdict.classList.add('visible');
        shareBtn.classList.remove('visible');
      } else {
        verdict.classList.remove('visible');
        shareBtn.classList.remove('visible');
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    // Share
    document.getElementById('shareBtn').addEventListener('click', () => {
      const vName = document.getElementById('verdictName').textContent;
      const vSavings = document.getElementById('verdictSavings').textContent;
      const text = `рЯПЖ ${vName}\nрЯУК ${vSavings}\n\nCompared with Price Pop`;
      if (navigator.share) {
        navigator.share({ title: 'Price Pop Result', text }).catch(() => {});
      } else {
        navigator.clipboard.writeText(text).then(() => showToast('Result copied to clipboard! рЯУЛ'));
      }
    });

    document.getElementById('addBtn').addEventListener('click', () => {
      const labels = ['Product A','Product B','Product C','Product D','Product E','Product F'];
      const name = labels[products.length] || `Product ${products.length + 1}`;
      addProduct(name, '', '', 'рЯЫНпЄП');
    });

    document.getElementById('resetBtn').addEventListener('click', resetAll);

    // close emoji picker on outside click
    document.addEventListener('click', e => {
      if (activeEmojiCard && !e.target.closest('.card-icon') && !e.target.closest('.emoji-picker')) {
        closeEmojiPicker();
      }
    });

    // expose globals for inline handlers
    window.updateField = updateField;
    window.removeProduct = removeProduct;
    window.startRename = startRename;
    window.commitRename = commitRename;
    window.openEmojiPicker = openEmojiPicker;
    window.setEmoji = setEmoji;

    resetAll();
  </script>
</body>
</html>
